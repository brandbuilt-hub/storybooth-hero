<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SQSP embed test</title>
<style>body{margin:0;font-family:-apple-system,sans-serif}
#header{position:sticky;top:0;height:60px;background:#111;color:#fff;display:flex;align-items:center;padding:0 24px;z-index:50}
.sec{min-height:100vh;display:grid;place-items:center;font-size:28px}.above{background:#e8e4db}.below{background:#1a1614;color:#f4ede1;min-height:150vh}
.sqsp-section{transform:translateZ(0);position:relative;background:#ededed}</style></head><body>
<div id="header">StoryBooth · nav</div>
<section class="sec above">↓ above ↓</section>
<div class="sqsp-section">
<!-- ===== StoryBooth scroll-reveal hero — paste this whole block into ONE Squarespace Code Block ===== -->
<div id="sbb-spacer" aria-hidden="true"></div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&display=swap" rel="stylesheet">

<style>
  #sbb-spacer{height:600vh;position:relative;z-index:0;margin:0}
  .sbb-stage{position:fixed;inset:0;width:100vw;height:100vh;background:#050403;overflow:hidden;display:none;z-index:99990}
  .sbb-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .sbb-vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 75% 90% at 50% 50%,transparent 62%,rgba(4,2,1,.32) 96%,#070403 100%)}
  .sbb-hud{position:absolute;inset:0;pointer-events:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:#f4ede1}
  /* Elyse-style hero layer: giant serif wordmark lower-left, kicker + para right column */
  .sbb-mark{position:absolute;left:clamp(20px,3.4vw,56px);bottom:clamp(18px,5vh,54px);
    font-family:'Fraunces',Georgia,serif;font-weight:480;font-size:clamp(64px,12.5vw,220px);
    line-height:.82;letter-spacing:-.015em;color:#f4ede1 !important;will-change:opacity,transform;
    text-shadow:0 2px 60px rgba(0,0,0,.35)}
  .sbb-mark b{font-weight:480;color:#cfe0c3}
  .sbb-rightcol{position:absolute;right:clamp(24px,4.5vw,72px);bottom:clamp(120px,24vh,270px);
    width:min(36ch,30vw);min-width:260px;will-change:opacity,transform}
  .sbb-kick{font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:430;
    font-size:clamp(18px,1.65vw,27px);line-height:1.28;letter-spacing:.02em;
    text-transform:uppercase;color:#f4ede1 !important}
  .sbb-rightcol p{margin:22px 0 0;font-size:clamp(13.5px,1.05vw,15.5px);line-height:1.65;color:rgba(244,237,225,.62) !important}
  .sbb-cue{margin-top:clamp(28px,5vh,56px);font-family:'Fraunces',Georgia,serif;
    font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:rgba(244,237,225,.55)}
  @media(max-width:760px){.sbb-rightcol{right:20px;left:20px;width:auto;bottom:30vh}.sbb-mark{font-size:clamp(48px,14vw,120px)}}
  .sbb-cap{position:absolute;left:0;right:0;bottom:clamp(28px,6vh,64px);text-align:center;opacity:0;will-change:opacity,transform;font-size:clamp(13px,1.1vw,16px);color:rgba(244,237,225,.62) !important}
  .sbb-cap b{color:#f4ede1 !important;font-weight:600}
  .sbb-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#050403;color:rgba(244,237,225,.6);font-size:12px;letter-spacing:.2em;text-transform:uppercase;transition:opacity .4s}
  .sbb-loader.hidden{opacity:0;pointer-events:none}
  /* keep the Squarespace nav above the reveal; native absolute header scrolls away */
  .header, #header{z-index:99999 !important}
</style>

<script>
(function(){
  if (window.__sbbInit) return; window.__sbbInit = true;

  // To swap in the final video later: re-extract its frames, set BASE + N to match.
  var BASE = "https://cdn.jsdelivr.net/gh/brandbuilt-hub/storybooth-hero@68e80c33dad952c3654f644ef93e79871211a5a0/assets/scrub";
  var N = 449, START = 64, PAD = 4;   // START = first frame shown at top of scroll (48fps interpolated set)

  function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }
  function ss(e0,e1,x){ var t=clamp((x-e0)/(e1-e0),0,1); return t*t*(3-2*t); }
  function pad(n){ n=String(n); while(n.length<PAD) n='0'+n; return n; }

  function start(){
    var spacer = document.getElementById('sbb-spacer');
    if (!spacer) return;

    var stage = document.createElement('div');
    stage.className = 'sbb-stage';
    stage.innerHTML =
      '<canvas></canvas>' +
      '<div class="sbb-vig"></div>' +
      '<div class="sbb-hud">' +
        '<div class="sbb-mark">Story<b>Booth</b></div>' +
        '<div class="sbb-rightcol">' +
          '<div class="sbb-kick">Step inside.<br>Everything else disappears.</div>' +
          '<p>A conversation booth for the moments worth keeping &mdash; two people, one conversation, and the warmth between them.</p>' +
          '<div class="sbb-cue">Scroll</div>' +
        '</div>' +
        '<div class="sbb-cap">Waterfront, golden hour &mdash; <b>a booth that turns a moment into a recording.</b></div>' +
      '</div>' +
      '<div class="sbb-loader">Loading&hellip;</div>';
    document.body.appendChild(stage);   // escape Squarespace transformed ancestors so fixed = viewport

    var canvas = stage.querySelector('canvas');
    var ctx = canvas.getContext('2d');
    var mark = stage.querySelector('.sbb-mark');
    var rightcol = stage.querySelector('.sbb-rightcol');
    var cap = stage.querySelector('.sbb-cap');
    var loader = stage.querySelector('.sbb-loader');

    var frames = new Array(N), loaded = 0;
    for (var i=0;i<N;i++){
      var im = new Image();
      im.onload = (function(){ loaded++; if (loaded===Math.min(N,48)) loader.classList.add('hidden'); kick(); });
      im.src = BASE + '/f_' + pad(i+1) + '.webp';
      frames[i] = im;
    }
    // 4K money shot: fades in over the video frame as the camera settles
    var hires = new Image();
    hires.src = BASE + '/final-4k.webp';

    function resize(){
      var dpr = Math.min(window.devicePixelRatio||1, 2);
      canvas.width = Math.round(window.innerWidth*dpr);
      canvas.height = Math.round(window.innerHeight*dpr);
      canvas.style.width = window.innerWidth+'px';
      canvas.style.height = window.innerHeight+'px';
    }
    function drawCover(img){
      var cw=canvas.width, ch=canvas.height, ir=img.width/img.height, cr=cw/ch, dw,dh,dx,dy;
      if (ir>cr){ dh=ch; dw=ch*ir; dx=(cw-dw)/2; dy=0; } else { dw=cw; dh=cw/ir; dx=0; dy=(ch-dh)/2; }
      ctx.drawImage(img,dx,dy,dw,dh);
    }
    function progress(){
      var r = spacer.getBoundingClientRect();
      var total = spacer.offsetHeight - window.innerHeight;
      return clamp(-r.top/total, 0, 1);
    }
    function inRange(){
      var r = spacer.getBoundingClientRect();
      return r.top < window.innerHeight && r.bottom > 0;
    }
    // smoothed scrub: frame chases scroll position; stage translate stays 1:1 with the page
    var pCur = 0, animating = false, settled = true;
    function render(){
      var r = spacer.getBoundingClientRect();
      var vh = window.innerHeight;
      var H = spacer.offsetHeight;
      // fully before or fully past the reveal → hide so other sections are untouched
      if (r.bottom <= 0 || r.top >= vh){ stage.style.display='none'; animating=false; return; }
      stage.style.display='block';
      var ty, pT;
      if (r.top > 0){ ty = r.top; pT = 0; }               // scrolling in
      else if (r.bottom < vh){ ty = r.bottom - vh; pT = 1; } // releasing: slide up, next section rises under it
      else { ty = 0; pT = clamp(-r.top/(H - vh), 0, 1); }  // pinned + scrubbing
      stage.style.transform = 'translateY(' + ty + 'px)';
      pCur += (pT - pCur) * 0.12;
      if (Math.abs(pT - pCur) < 0.0006) pCur = pT;
      settled = (pCur === pT);
      var p = pCur;
      var idx = START + Math.round(p*(N-1-START));
      var img = frames[idx];
      if (!(img && img.complete && img.naturalWidth)){
        for (var d=1; d<N; d++){
          var a=frames[idx-d], b=frames[idx+d];
          if (a && a.complete && a.naturalWidth){ img=a; break; }
          if (b && b.complete && b.naturalWidth){ img=b; break; }
        }
      }
      if (img && img.complete && img.naturalWidth) drawCover(img);
      // focus-pull into the 4K product frame at the very end
      if (p>0.93 && hires.complete && hires.naturalWidth){
        ctx.globalAlpha = ss(0.93,1,p);
        drawCover(hires);
        ctx.globalAlpha = 1;
      }
      mark.style.opacity = (1-ss(0.05,0.2,p));
      mark.style.transform = 'translateY(' + (30*ss(0.05,0.2,p)) + 'px)';
      rightcol.style.opacity = (1-ss(0.05,0.18,p));
      rightcol.style.transform = 'translateY(' + (-18*ss(0.05,0.18,p)) + 'px)';
      cap.style.opacity = ss(0.82,0.97,p);
      cap.style.transform = 'translateY(' + (20*(1-ss(0.82,0.97,p))) + 'px)';
      if (!settled){ requestAnimationFrame(render); } else { animating = false; }
    }
    function kick(){ if(!animating){ animating = true; requestAnimationFrame(render); } }

    window.addEventListener('scroll', kick, {passive:true});
    window.addEventListener('resize', function(){ resize(); kick(); }, {passive:true});
    resize(); kick();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
<!-- ===== end StoryBooth block ===== -->
</div>
<section class="sec below">Next section</section>
</body></html>
